<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:style>
    .llm-settings {
      margin-top: 16px;
    }
  </html:style>
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <hbox align="center">
    <html:label data-l10n-id="pref-llm-provider"></html:label>
    <!-- Replace -->
    <box id="__addonRef__-llm-provider-placeholder"></box>
  </hbox>
  <vbox id="__addonRef__-local-settings" class="llm-settings" hidden="true">
    <html:label
      for="zotero-prefpane-__addonRef__-local-port"
      data-l10n-id="pref-port"
    ></html:label>
    <html:input
      type="text"
      id="zotero-prefpane-__addonRef__-local-port"
      preference="localPort"
    ></html:input>
  </vbox>
  <vbox id="__addonRef__-goethe-settings" class="llm-settings" hidden="true">
    <html:label
      for="zotero-prefpane-__addonRef__-goethe-api-key"
      data-l10n-id="pref-api-key"
    ></html:label>
    <html:input
      type="password"
      id="zotero-prefpane-__addonRef__-goethe-api-key"
      preference="goetheApiKey"
    ></html:input>
  </vbox>
</groupbox>
